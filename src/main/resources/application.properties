spring.application.name=freelanceflow

# MongoDB connection \u2014 read from env var MONGODB_URI (for cloud deployment).
# Falls back to local MongoDB when env var is not set (for Eclipse dev).
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/freelanceflow}

# HTTP port \u2014 cloud hosts (Render/Railway/etc.) inject $PORT.
# Locally defaults to 8080.
server.port=${PORT:8080}

# Allow larger file uploads (for SRS documents)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB