spring.application.name=freelanceflow
spring.data.mongodb.uri=mongodb://localhost:27017/freelanceflow

# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# Email (Gmail SMTP) \u2014 used for sending OTP verification
# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# SETUP (one-time):
#   1. Go to your Gmail account -> Manage Account -> Security
#   2. Enable 2-Step Verification
#   3. Open https://myaccount.google.com/apppasswords
#   4. Generate an App Password (name it "FreelanceFlow")
#   5. Paste the 16-char app password below as MAIL_PASSWORD
#   6. Put YOUR Gmail address as MAIL_USERNAME
# You can also set these as environment variables in Eclipse
# Run Configuration > Environment tab, instead of hard-coding.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-16-char-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OTP settings
app.otp.expiry-minutes=15
app.mail.from=${MAIL_USERNAME:your-email@gmail.com}
